name: CI
# on -> définit sur quelle action s'appliquent les jobs
on:
  push:
    branches: [ main ]

# jobs = étapes
jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout # copie le code sur la VM
        uses: actions/checkout@v4

      - name: Setup Node # setup node avec une version précise
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # Installe les dépendances depuis le package-lock.json (dépendances stables) alors que npm install le fait depuis package.json

      - name: Lint
        run: npm run lint # Lance le linter du projet

      - name: Test
        run: npm run test # Lance les tests du projet

      - name: Upload test coverage
        uses: actions/upload-artifact@v4 # Upload le résultat du coverage et le conserve 7 jours
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Verify secret is available
        env:
          API_KEY: ${{secrets.API_KEY}}
        run: |
          if [ -z "$API_KEY"]; then 
            echo "Secret manquant"
            exit 1
          fi
          echo "Secret disponible (valeur masquée par github)"

